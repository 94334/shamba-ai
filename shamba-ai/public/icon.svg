<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background - rounded square for Play Store, maskable safe zone is inner 80% -->
  <rect width="512" height="512" rx="96" fill="#3B6D11"/>

  <!-- Subtle inner glow ring for depth -->
  <rect width="512" height="512" rx="96" fill="none" stroke="#27500A" stroke-width="8" opacity="0.4"/>

  <!-- Soil / ground line -->
  <rect x="136" y="356" width="240" height="14" rx="7" fill="#27500A" opacity="0.6"/>
  <rect x="160" y="370" width="192" height="8" rx="4" fill="#27500A" opacity="0.35"/>

  <!-- Main stem -->
  <line x1="256" y1="356" x2="256" y2="180" stroke="#C0DD97" stroke-width="18" stroke-linecap="round"/>

  <!-- Large left leaf -->
  <path d="M256 260 C200 240, 140 190, 152 130 C162 82, 220 120, 256 200"
        fill="#97C459" stroke="#C0DD97" stroke-width="4" stroke-linejoin="round"/>

  <!-- Large right leaf -->
  <path d="M256 210 C312 190, 372 140, 360 80 C348 32, 290 72, 256 160"
        fill="#97C459" stroke="#C0DD97" stroke-width="4" stroke-linejoin="round"/>

  <!-- Small sprouting leaf at top -->
  <path d="M256 180 C236 160, 220 130, 242 112 C256 100, 262 140, 256 180"
        fill="#C0DD97" stroke="none"/>

  <!-- Leaf vein detail - left -->
  <path d="M256 260 C226 240, 172 196, 158 145"
        fill="none" stroke="#3B6D11" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Leaf vein detail - right -->
  <path d="M256 210 C286 192, 342 152, 354 96"
        fill="none" stroke="#3B6D11" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Two small roots -->
  <path d="M236 366 C220 380, 200 390, 188 405"
        fill="none" stroke="#27500A" stroke-width="7" stroke-linecap="round" opacity="0.5"/>
  <path d="M276 366 C292 382, 310 392, 322 408"
        fill="none" stroke="#27500A" stroke-width="7" stroke-linecap="round" opacity="0.5"/>

  <!-- Small decorative dots (dew/seeds) -->
  <circle cx="180" cy="160" r="7" fill="#EAF3DE" opacity="0.5"/>
  <circle cx="332" cy="108" r="6" fill="#EAF3DE" opacity="0.4"/>
  <circle cx="200" cy="290" r="5" fill="#EAF3DE" opacity="0.3"/>
</svg>
