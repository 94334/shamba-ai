<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ─── PWA core ─── -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#3B6D11" />

    <!-- ─── iOS / Safari PWA support ─── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Shamba AI" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- ─── Favicon ─── -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- ─── SEO / Open Graph ─── -->
    <title>Shamba AI — Kirinyaga Farm Advisor</title>
    <meta
      name="description"
      content="AI-powered farm advisor for Kirinyaga County. Crop disease diagnosis from photos, live weather, market prices — in English and Swahili."
    />
    <meta name="keywords" content="shamba, kilimo, kirinyaga, mwea, farming, Kenya, agriculture, mazao" />
    <meta name="author" content="Shamba AI" />

    <!-- Open Graph (for WhatsApp / social sharing) -->
    <meta property="og:title" content="Shamba AI — Farm Advisor" />
    <meta property="og:description" content="AI crop advisor for Kirinyaga County farmers. Free, in Swahili & English." />
    <meta property="og:image" content="/icons/icon-512.png" />
    <meta property="og:type" content="website" />

    <!-- ─── Android splash screen colour ─── -->
    <meta name="msapplication-TileColor" content="#3B6D11" />
    <meta name="msapplication-TileImage" content="/icons/icon-144.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
